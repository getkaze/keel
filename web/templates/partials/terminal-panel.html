{{define "terminal-panel"}}
<div id="terminal-container"
     x-data="terminalPanel()"
     x-effect="if (terminalOpen) $nextTick(() => initActiveTab())"
     @connect-container.document="addContainerTab($event.detail.name)"
     style="height:300px;background:var(--terminal-bg);min-height:0;display:flex;flex-direction:column">

    <!-- Header bar with resize handle -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;user-select:none">
        <!-- Tab bar -->
        <div class="terminal-tabs" style="border:none;overflow-x:auto;flex:1" @mousedown.stop>
            <template x-for="tab in tabs" :key="tab.id">
                <div style="display:inline-flex;align-items:center">
                    <button @click="switchTab(tab.id)"
                            class="terminal-tab"
                            :class="activeTabId === tab.id ? 'active' : ''"
                            style="border-right:none;height:32px;padding:0 12px">
                        <span x-text="tab.label"></span>
                        <span x-show="tab.connected"
                              style="width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green);display:inline-block"></span>
                        <span x-show="!tab.connected"
                              style="width:5px;height:5px;border-radius:50%;background:var(--red);display:inline-block"></span>
                    </button>
                    <button x-show="tab.id !== 'local'"
                            @click="closeTab(tab.id)"
                            style="border:none;cursor:pointer;color:var(--muted2);font-size:12px;line-height:1;padding:2px 4px;border-radius:3px;background:transparent;margin-right:4px"
                            @mouseenter="$el.style.color='var(--red)'"
                            @mouseleave="$el.style.color='var(--muted2)'">&times;</button>
                </div>
            </template>
        </div>
        <div style="display:flex;align-items:center;gap:2px;flex-shrink:0" @mousedown.stop>
            <button class="btn btn-ghost sm" @click="toggleMaximize()" aria-label="Maximize terminal"
                    style="margin:0;padding:3px 8px">
                <svg x-show="!maximized" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                </svg>
                <svg x-show="maximized" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <rect x="6" y="3" width="15" height="15" rx="2"/>
                    <path d="M6 7H4a1 1 0 00-1 1v12a1 1 0 001 1h12a1 1 0 001-1v-2"/>
                </svg>
            </button>
            <button class="btn btn-ghost sm" @click="terminalOpen = false" aria-label="Close terminal"
                    style="margin:0;padding:3px 8px">
                <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Terminal viewport -->
    <div x-ref="terminalViewport" style="flex:1;background:var(--terminal-bg);padding:4px;min-height:0;overflow:hidden;position:relative"></div>
</div>

<script>
function terminalPanel() {
    return {
        tabs: [
            { id: 'local', label: 'Local', container: null, term: null, fitAddon: null, ws: null, connected: false, initialized: false, el: null }
        ],
        activeTabId: 'local',
        maximized: false,
        _nextId: 1,
        _resizeObserver: null,

        _createTermEl(tabId) {
            var el = document.createElement('div');
            el.id = 'term-' + tabId;
            el.style.cssText = 'position:absolute;inset:0;';
            el.style.display = 'none';
            this.$refs.terminalViewport.appendChild(el);
            return el;
        },

        initActiveTab() {
            var tab = this.getActiveTab();
            if (!tab) return;

            if (tab.initialized) {
                this._showOnly(tab.id);
                if (tab.fitAddon) tab.fitAddon.fit();
                if (tab.term) tab.term.focus();
                return;
            }

            var viewport = this.$refs.terminalViewport;
            if (!viewport) return;

            if (!tab.el) {
                tab.el = this._createTermEl(tab.id);
            }

            tab.initialized = true;

            var self = this;
            var openWithFont = function(fontFamily) {
                tab.term = new Terminal({
                    cursorBlink: true,
                    cursorStyle: 'block',
                    fontSize: 13,
                    fontFamily: fontFamily,
                    theme: {
                        background: '#050505',
                        foreground: '#e8e8e8',
                        cursor: '#8b5cf6',
                        cursorAccent: '#000000',
                        selectionBackground: '#8b5cf640',
                        black: '#0a0a0a',
                        red: '#ef4444',
                        green: '#22c55e',
                        yellow: '#eab308',
                        blue: '#3b82f6',
                        magenta: '#c678dd',
                        cyan: '#00d4d4',
                        white: '#e8e8e8',
                        brightBlack: '#666666',
                        brightRed: '#ff5555',
                        brightGreen: '#50fa7b',
                        brightYellow: '#f1fa8c',
                        brightBlue: '#6ba4ff',
                        brightMagenta: '#ff79c6',
                        brightCyan: '#8be9fd',
                        brightWhite: '#f8f8f2'
                    }
                });

                tab.fitAddon = new FitAddon.FitAddon();
                tab.term.loadAddon(tab.fitAddon);
                self._showOnly(tab.id);
                tab.term.open(tab.el);
                requestAnimationFrame(function() {
                    tab.fitAddon.fit();
                    tab.initialized = true;
                    self._initTabIO(tab);
                });
            };

            var systemMono = "'DejaVu Sans Mono', 'Liberation Mono', 'Noto Sans Mono', 'Fira Code', monospace";
            var preferredFont = "'RecursiveMono', " + systemMono;

            if (document.fonts && document.fonts.load) {
                document.fonts.load('13px "RecursiveMono"').then(function(loaded) {
                    if (loaded && loaded.length > 0) {
                        openWithFont(preferredFont);
                    } else {
                        openWithFont(systemMono);
                    }
                }).catch(function() {
                    openWithFont(systemMono);
                });
            } else {
                openWithFont(systemMono);
            }
        },

        _initTabIO(tab) {
            var self = this;
            var tabId = tab.id;
            tab.term.onData(function(data) {
                var t = self.getTab(tabId);
                if (t && t.ws && t.ws.readyState === WebSocket.OPEN) {
                    t.ws.send(new TextEncoder().encode(data));
                } else if (t && !t.connected && data === '\r') {
                    t.term.clear();
                    self.connectTab(tabId);
                }
            });

            this.connectTab(tab.id);
            this._setupResizeListeners();
        },

        _showOnly(activeId) {
            for (var i = 0; i < this.tabs.length; i++) {
                var t = this.tabs[i];
                if (t.el) {
                    t.el.style.display = t.id === activeId ? 'block' : 'none';
                }
            }
        },

        _setupResizeListeners() {
            var self = this;
            if (!this._resizeObserver) {
                window.addEventListener('resize', function() {
                    var tab = self.getActiveTab();
                    if (tab && tab.fitAddon && self.terminalOpen) {
                        tab.fitAddon.fit();
                        self.sendResize(tab);
                    }
                });

                var viewport = this.$refs.terminalViewport;
                if (viewport) {
                    this._resizeObserver = new ResizeObserver(function() {
                        var tab = self.getActiveTab();
                        if (tab && tab.fitAddon && self.terminalOpen) {
                            tab.fitAddon.fit();
                            self.sendResize(tab);
                        }
                    });
                    this._resizeObserver.observe(viewport);
                }
            }
        },

        getTab(id) {
            for (var i = 0; i < this.tabs.length; i++) {
                if (this.tabs[i].id === id) return this.tabs[i];
            }
            return null;
        },

        getActiveTab() {
            return this.getTab(this.activeTabId);
        },

        switchTab(id) {
            this.activeTabId = id;
            var self = this;
            this.$nextTick(function() {
                var tab = self.getActiveTab();
                if (tab && tab.initialized) {
                    self._showOnly(id);
                    tab.fitAddon.fit();
                    self.sendResize(tab);
                    tab.term.focus();
                } else if (tab && !tab.initialized) {
                    self.initActiveTab();
                }
            });
        },

        addContainerTab(name) {
            for (var i = 0; i < this.tabs.length; i++) {
                if (this.tabs[i].container === name) {
                    this.switchTab(this.tabs[i].id);
                    return;
                }
            }

            var tabId = 'container-' + this._nextId++;
            this.tabs.push({
                id: tabId,
                label: name,
                container: name,
                term: null,
                fitAddon: null,
                ws: null,
                connected: false,
                initialized: false,
                el: null
            });

            var self = this;
            this.$nextTick(function() {
                self.switchTab(tabId);
            });
        },

        closeTab(id) {
            var tab = this.getTab(id);
            if (!tab || tab.id === 'local') return;

            var ws = tab.ws;
            var term = tab.term;
            tab.ws = null;
            tab.term = null;
            tab.connected = false;

            if (ws && ws.readyState <= WebSocket.OPEN) {
                ws.close();
            }
            if (term) {
                try { term.dispose(); } catch(e) {}
            }
            if (tab.el && tab.el.parentNode) {
                tab.el.parentNode.removeChild(tab.el);
            }

            this.tabs = this.tabs.filter(function(t) { return t.id !== id; });

            if (this.activeTabId === id) {
                this.switchTab('local');
            }
        },

        connectTab(tabId) {
            var tab = this.getTab(tabId);
            if (!tab) return;

            var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            var path = tab.container
                ? '/ws/terminal/exec/' + encodeURIComponent(tab.container)
                : '/ws/terminal';
            var url = protocol + '//' + window.location.host + path;

            tab.ws = new WebSocket(url);
            tab.ws.binaryType = 'arraybuffer';

            var self = this;
            var thisWs = tab.ws;

            tab.ws.onopen = function() {
                tab.connected = true;
                self.tabs = self.tabs.slice();
                self.sendResize(tab);
                // Clear screen client-side so the prompt renders clean
                // at the top. Done here (not server-side) to avoid a race
                // where ANSI escapes arrive before xterm.js is ready.
                if (tab.term) {
                    tab.term.clear();
                    tab.term.focus();
                }
            };

            tab.ws.onmessage = function(e) {
                if (e.data instanceof ArrayBuffer && tab.term) {
                    tab.term.write(new Uint8Array(e.data));
                }
            };

            tab.ws.onclose = function() {
                if (tab.ws !== thisWs) return;
                tab.connected = false;
                self.tabs = self.tabs.slice();
                if (tab.term) {
                    tab.term.write('\r\n\x1b[31mConnection lost.\x1b[0m Press Enter to reconnect...');
                }
            };

            tab.ws.onerror = function() {
                if (tab.ws !== thisWs) return;
                tab.connected = false;
                self.tabs = self.tabs.slice();
            };
        },

        sendResize(tab) {
            if (tab.ws && tab.ws.readyState === WebSocket.OPEN && tab.term) {
                tab.ws.send(JSON.stringify({
                    type: 'resize',
                    cols: tab.term.cols,
                    rows: tab.term.rows
                }));
            }
        },

        toggleMaximize() {
            var container = document.getElementById('terminal-container');
            var self = this;
            if (this.maximized) {
                container.style.height = '300px';
                this.maximized = false;
            } else {
                container.style.height = 'calc(100vh - 48px)';
                this.maximized = true;
            }
            this.$nextTick(function() {
                var tab = self.getActiveTab();
                if (tab && tab.fitAddon) {
                    tab.fitAddon.fit();
                    self.sendResize(tab);
                }
            });
        }
    };
}
</script>
{{end}}
