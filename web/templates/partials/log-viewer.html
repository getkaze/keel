{{define "log-viewer"}}
<div x-data="logViewer()"
     x-init="init()"
     @keydown.escape.window="if (streaming) disconnect()"
     style="display:flex;flex-direction:column;height:100%">

    <!-- Page header -->
    <div class="page-header">
        <span class="page-title">Logs</span>
        <div class="page-actions">
            <div style="display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;color:var(--muted)">
                <span class="dot animate-pulse" :class="streaming ? 'dot-success' : 'dot-ghost'"
                      style="width:5px;height:5px"></span>
                <span x-text="streaming ? 'streaming' : 'idle'"></span>
            </div>
        </div>
    </div>

    <!-- Logs layout: sidebar + main -->
    <div class="logs-layout" style="flex:1;height:0">
        <!-- Log sources sidebar -->
        <div class="logs-sidebar">
            <div style="padding:8px 10px 4px">
                <input type="text" x-model="searchQuery" placeholder="Search..."
                       style="width:100%;margin:0;padding:4px 8px;font-size:11px">
            </div>
            {{range $g := .Groups}}
            <div class="logs-sidebar-group" x-show="isGroupVisible('{{$g.Name}}')"
                 style="padding:6px 10px 2px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted)">
                {{$g.Name}}
            </div>
            {{range $g.Services}}
            <div class="logs-sidebar-item"
                 x-show="isServiceVisible('{{.Name}}')"
                 @click="selectedService = '{{.Name}}'; $nextTick(() => onServiceChange())"
                 :class="selectedService === '{{.Name}}' ? 'active' : ''">
                <span class="dot" :class="selectedService === '{{.Name}}' ? 'dot-success' : 'dot-ghost'" style="width:5px;height:5px"></span>
                {{.Name}}
                <span class="log-type">stdout</span>
            </div>
            {{end}}
            {{end}}
        </div>

        <!-- Log main area -->
        <div class="logs-main">
            <!-- Toolbar -->
            <div class="logs-toolbar">
                <span class="logs-toolbar-label" x-text="selectedService || 'Select a service'"></span>

                <template x-if="sources.length > 1">
                    <select x-model="selectedSource" @change="onSourceChange()" style="width:auto;margin:0;padding:3px 24px 3px 8px">
                        <template x-for="src in sources" :key="src.name">
                            <option :value="src.name" x-text="src.name"></option>
                        </template>
                    </select>
                </template>

                <template x-if="selectedSourceType === 'file'">
                    <select x-model="selectedFile" @change="reconnect()" style="width:auto;margin:0;padding:3px 24px 3px 8px">
                        <template x-if="files.length === 0">
                            <option value="" disabled selected>no files found</option>
                        </template>
                        <template x-if="files.length > 0">
                            <option value="">Select file...</option>
                        </template>
                        <template x-for="f in files" :key="f.path">
                            <option :value="f.path" x-text="f.name"></option>
                        </template>
                    </select>
                </template>

                <div class="log-search">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" x-model.debounce.200ms="filterQuery" placeholder="Filter logs..."
                           @input="applyFilter()">
                    <button class="btn-case" :class="filterCaseSensitive ? 'active' : ''"
                            @click="filterCaseSensitive = !filterCaseSensitive; applyFilter()"
                            title="Case sensitive">Aa</button>
                    <span x-show="filterQuery" style="font-size:10px;color:var(--muted);white-space:nowrap"
                          x-text="filterMatchCount + '/' + lineCount"></span>
                    <button x-show="filterQuery" class="btn-filter-clear" @click="filterQuery = ''; applyFilter()"
                            title="Clear filter">&times;</button>
                </div>

                <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
                    <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);margin:0">
                        Lines:
                        <input type="number" x-model.number="lines" min="1" max="10000" value="100"
                               style="width:4rem;margin:0;padding:3px 6px;font-size:10px">
                    </label>

                    <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);margin:0">
                        Follow
                        <input type="checkbox" role="switch" x-model="follow" checked style="width:auto">
                    </label>

                    <button class="btn btn-primary sm" x-show="!streaming && canConnect" @click="connect()" style="margin:0">
                        <svg class="icon-sm"><use href="/static/lucide-sprite.svg#play"></use></svg>
                        Stream
                    </button>
                    <button class="btn btn-danger sm" x-show="streaming" @click="disconnect()" style="margin:0">
                        <svg class="icon-sm"><use href="/static/lucide-sprite.svg#square"></use></svg>
                        Stop
                    </button>
                    <button class="btn btn-ghost sm" @click="clearOutput()" style="margin:0">Clear</button>
                </div>
            </div>

            <!-- Log output -->
            <div x-ref="logOutput" class="logs-output" @scroll="onScroll()">
                <template x-if="!selectedService">
                    <div class="empty-state" style="height:100%">
                        <svg class="empty-state-icon" viewBox="0 0 24 24"><use href="/static/lucide-sprite.svg#file-text"></use></svg>
                        <span class="empty-state-title">No service selected</span>
                        <span class="empty-state-hint">Choose a service from the sidebar to stream logs</span>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Scroll-to-bottom -->
    <button class="scroll-btn"
            x-show="!follow && lineCount > 0"
            x-transition
            @click="scrollToBottom()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
</div>

<script>
function logViewer() {
    return {
        selectedService: '',
        selectedSource: 'container',
        selectedFile: '',
        searchQuery: '',
        filterQuery: '',
        filterCaseSensitive: false,
        filterMatchCount: 0,
        sources: [],
        files: [],
        lines: 100,
        follow: true,
        streaming: false,
        lineCount: 0,
        eventSource: null,
        ansi: null,
        loading: false,

        serviceGroups: { {{range $g := .Groups}}{{range $g.Services}}'{{.Name}}': '{{$g.Name}}', {{end}}{{end}} },

        isServiceVisible(name) {
            if (!this.searchQuery) return true;
            return name.toLowerCase().includes(this.searchQuery.toLowerCase());
        },

        isGroupVisible(group) {
            if (!this.searchQuery) return true;
            var q = this.searchQuery.toLowerCase();
            for (var name in this.serviceGroups) {
                if (this.serviceGroups[name] === group && name.toLowerCase().includes(q)) return true;
            }
            return false;
        },

        get selectedSourceType() {
            var src = this.sources.find(s => s.name === this.selectedSource);
            return src ? src.type : 'docker';
        },

        get canConnect() {
            if (!this.selectedService) return false;
            var src = this.sources.find(s => s.name === this.selectedSource);
            if (!src) return false;
            // File-type sources always need a file selected (they point to directories).
            if (src.type === 'file' && !this.selectedFile) return false;
            return true;
        },

        init() {
            var params = new URLSearchParams(window.location.search);
            if (params.get('service')) {
                this.selectedService = params.get('service');
                this.$nextTick(() => this.onServiceChange());
            }

            document.addEventListener('open-logs', (e) => {
                this.selectedService = e.detail.service;
                this.$nextTick(() => this.onServiceChange());
            });
        },

        async onServiceChange() {
            this.disconnect();
            this.clearOutput();
            this.sources = [];
            this.files = [];
            this.selectedSource = 'container';
            this.selectedFile = '';

            if (!this.selectedService) return;

            this.loading = true;
            try {
                var resp = await fetch('/api/logs/' + encodeURIComponent(this.selectedService) + '/sources');
                if (resp.ok) {
                    this.sources = await resp.json();
                    this.selectedSource = this.sources.length > 0 ? this.sources[0].name : 'container';
                    this.onSourceChange();
                }
            } catch (e) {
                console.error('Failed to load log sources:', e);
            }
            this.loading = false;

            this.$nextTick(() => this.connect());
        },

        onSourceChange() {
            this.selectedFile = '';
            var src = this.sources.find(s => s.name === this.selectedSource);
            if (src && src.files && src.files.length > 0) {
                this.files = src.files;
            } else {
                this.files = [];
            }
            if (this.streaming) {
                this.clearOutput();
                this.connect();
            }
        },

        connect() {
            if (!this.canConnect) return;
            this.disconnect();

            var url = '/api/logs/' + encodeURIComponent(this.selectedService)
                    + '?lines=' + this.lines;

            if (this.selectedFile) {
                url += '&source=' + encodeURIComponent(this.selectedSource);
                url += '&file=' + encodeURIComponent(this.selectedFile);
            } else if (this.selectedSource && this.selectedSource !== 'container') {
                url += '&source=' + encodeURIComponent(this.selectedSource);
            }

            this.eventSource = new EventSource(url);
            this.streaming = true;

            if (!this.ansi && typeof AnsiUp !== 'undefined') {
                this.ansi = new AnsiUp();
                this.ansi.use_classes = true;
            }

            var output = this.$refs.logOutput;

            this.eventSource.onmessage = (e) => {
                var line = document.createElement('div');
                line.setAttribute('data-log', e.data);
                line.innerHTML = safeAnsiHtml(this.ansi, e.data);
                this.lineCount++;
                if (this.filterQuery) {
                    var text = e.data;
                    var query = this.filterQuery;
                    if (!this.filterCaseSensitive) {
                        text = text.toLowerCase();
                        query = query.toLowerCase();
                    }
                    if (text.indexOf(query) === -1) {
                        line.style.display = 'none';
                    } else {
                        this.filterMatchCount++;
                        this._highlightLine(line, e.data);
                    }
                }
                output.appendChild(line);
                if (this.follow) {
                    output.scrollTop = output.scrollHeight;
                }
            };

            this.eventSource.addEventListener('app-error', (e) => {
                this.streaming = false;
                if (e.data) {
                    var line = document.createElement('div');
                    line.className = 'text-error font-semibold mt-1';
                    line.textContent = e.data;
                    output.appendChild(line);
                }
            });
        },

        disconnect() {
            if (this.eventSource) {
                this.eventSource.close();
                this.eventSource = null;
            }
            this.streaming = false;
        },

        reconnect() {
            if (this.streaming) {
                this.clearOutput();
                this.connect();
            }
        },

        applyFilter() {
            var output = this.$refs.logOutput;
            var children = output.children;
            var matchCount = 0;
            var query = this.filterQuery;
            var cs = this.filterCaseSensitive;
            var qLower = cs ? query : query.toLowerCase();

            for (var i = 0; i < children.length; i++) {
                var el = children[i];
                if (el.tagName === 'TEMPLATE') continue;
                var raw = el.getAttribute('data-log');
                if (!raw) continue;

                // Restore original content (remove highlights)
                el.innerHTML = safeAnsiHtml(this.ansi, raw);

                if (!query) {
                    el.style.display = '';
                    continue;
                }

                var text = cs ? raw : raw.toLowerCase();
                if (text.indexOf(qLower) === -1) {
                    el.style.display = 'none';
                } else {
                    el.style.display = '';
                    matchCount++;
                    this._highlightLine(el, raw);
                }
            }
            this.filterMatchCount = matchCount;
        },

        _highlightLine(el, raw) {
            var query = this.filterQuery;
            if (!query) return;
            var flags = this.filterCaseSensitive ? 'g' : 'gi';
            var regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
            // Walk text nodes to insert highlights without breaking HTML tags
            var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
            var nodes = [];
            while (walker.nextNode()) nodes.push(walker.currentNode);
            for (var i = 0; i < nodes.length; i++) {
                var node = nodes[i];
                var text = node.textContent;
                if (!regex.test(text)) continue;
                regex.lastIndex = 0;
                var frag = document.createDocumentFragment();
                var lastIdx = 0;
                var match;
                while ((match = regex.exec(text)) !== null) {
                    if (match.index > lastIdx) {
                        frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
                    }
                    var mark = document.createElement('mark');
                    mark.className = 'log-highlight';
                    mark.textContent = match[0];
                    frag.appendChild(mark);
                    lastIdx = regex.lastIndex;
                }
                if (lastIdx < text.length) {
                    frag.appendChild(document.createTextNode(text.slice(lastIdx)));
                }
                node.parentNode.replaceChild(frag, node);
            }
        },

        clearOutput() {
            var output = this.$refs.logOutput;
            var children = Array.from(output.children);
            children.forEach(child => {
                if (child.tagName !== 'TEMPLATE') child.remove();
            });
            this.lineCount = 0;
            this.filterMatchCount = 0;
        },

        onScroll() {
            var el = this.$refs.logOutput;
            var atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 50;
            if (!atBottom && this.follow) {
                this.follow = false;
            }
        },

        scrollToBottom() {
            this.follow = true;
            this.$refs.logOutput.scrollTop = this.$refs.logOutput.scrollHeight;
        }
    };
}
</script>
{{end}}
