{{define "operation-progress"}}
<div id="operation-panel"
     class="operation-panel"
     x-data="{ open: false }"
     x-show="open"
     x-cloak
     x-transition
     @operation-start.window="open = true"
     @operation-close.window="open = false">

    <!-- Header bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface)">
        <div style="display:flex;align-items:center;gap:8px">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"
                 style="color:var(--accent)" class="animate-pulse">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            <span style="font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.06em">
                operation output
            </span>
        </div>
        <button class="btn btn-ghost sm" @click="open = false" aria-label="Close operation panel"
                style="margin:0;padding:3px 8px">
            <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>

    <!-- Scrollable output area -->
    <div id="operation-output"
         style="height:16rem;overflow:auto;font-family:var(--mono);font-size:11px;line-height:1.7;background:var(--bg);padding:12px 16px;white-space:pre-wrap;word-break:break-all;color:var(--accent)">
    </div>
</div>
{{end}}
