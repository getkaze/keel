{{define "actions-panel"}}
<div>
    <!-- Page header -->
    <div class="page-header">
        <span class="page-title">Actions</span>
        <span class="page-subtitle">run keel commands</span>
    </div>

    <div style="padding:20px 24px">
        <div class="actions-grid">
            <button hx-post="/api/install" hx-confirm="Run keel install?" class="action-card">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span class="action-card-title">Install</span>
                <span class="action-card-desc">Provision and configure the environment</span>
            </button>

            <button hx-post="/api/services/start-all" class="action-card">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <span class="action-card-title">Start All</span>
                <span class="action-card-desc">Start all services</span>
            </button>

            <button hx-post="/api/services/stop-all" hx-confirm="Stop all services?" class="action-card">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                <span class="action-card-title">Stop All</span>
                <span class="action-card-desc">Stop all running services</span>
            </button>

            <button hx-post="/api/reset" hx-confirm="Reset the environment? This will destroy all data." class="action-card danger">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                <span class="action-card-title">Reset</span>
                <span class="action-card-desc">Destroy all data and reset environment</span>
            </button>
        </div>
    </div>
</div>
{{end}}
