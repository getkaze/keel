{{define "service-new"}}
<div>
    <!-- Page header -->
    <div class="page-header">
        <a href="/"
           hx-get="/partials/overview" hx-target="#main-content" hx-push-url="/"
           class="btn btn-ghost sm">
            <svg class="icon-sm"><use href="/static/lucide-sprite.svg#chevron-left"></use></svg>
            Back
        </a>
        <span class="page-title">New container</span>
    </div>

    <div style="padding:20px 24px;max-width:680px">
        <!-- Form -->
        <form id="new-container-form" class="chart-section"
              hx-post="/api/services"
              hx-swap="none"
              hx-on::after-request="handleCreateResponse(event)"
              style="display:flex;flex-direction:column;gap:16px">

            <!-- Name + Image -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div>
                    <label class="field-label">name <span style="color:var(--red)">*</span></label>
                    <input type="text" name="name" class="field-input" placeholder="my-service" required
                           oninput="autoHostname(this.value)">
                    <div class="field-hint">Lowercase, hyphens only</div>
                </div>
                <div>
                    <label class="field-label">image <span style="color:var(--red)">*</span></label>
                    <input type="text" name="image" class="field-input" placeholder="nginx:latest" required>
                </div>
            </div>

            <!-- Registry + Group -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div>
                    <label class="field-label">registry</label>
                    <select name="registry" class="field-input">
                        <option value="">Docker Hub (default)</option>
                        <option value="ghcr">GHCR (ghcr.io)</option>
                    </select>
                    <div class="field-hint">GHCR requires credentials in state/ghcr-user + ghcr-pat</div>
                </div>
                <div>
                    <label class="field-label">group</label>
                    <input type="text" name="group" class="field-input" placeholder="database">
                    <div class="field-hint">Groups services in the dashboard</div>
                </div>
            </div>

            <!-- Hostname + Network -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div>
                    <label class="field-label">hostname</label>
                    <input type="text" id="field-hostname" name="hostname" class="field-input"
                           placeholder="keel-my-service">
                    <div class="field-hint">Auto-filled from name</div>
                </div>
                <div>
                    <label class="field-label">network</label>
                    <input type="text" name="network" class="field-input"
                           value="{{.DefaultNetwork}}" placeholder="keel-net">
                </div>
            </div>

            <!-- Ports -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div>
                    <label class="field-label">external port</label>
                    <input type="number" name="port_external" class="field-input" placeholder="8080" min="1" max="65535">
                </div>
                <div>
                    <label class="field-label">internal port</label>
                    <input type="number" name="port_internal" class="field-input" placeholder="80" min="1" max="65535">
                </div>
            </div>

            <!-- Environment Variables -->
            <div>
                <label class="field-label">environment variables</label>
                <textarea name="environment" class="field-input"
                          style="min-height:100px;resize:vertical"
                          placeholder="KEY=value&#10;ANOTHER_KEY=another_value&#10;# lines starting with # are ignored"
                          spellcheck="false"></textarea>
                <div class="field-hint">One KEY=VALUE per line</div>
            </div>

            <!-- Volumes -->
            <div>
                <label class="field-label">volumes</label>
                <textarea name="volumes" class="field-input"
                          style="min-height:60px;resize:vertical"
                          placeholder="my-volume:/data&#10;/host/path:/container/path"
                          spellcheck="false"></textarea>
                <div class="field-hint">One volume per line (volume:path or host:path)</div>
            </div>

            <!-- Command -->
            <div>
                <label class="field-label">command <span style="color:var(--muted2)">(optional)</span></label>
                <input type="text" name="command" class="field-input"
                       placeholder="--flag value">
                <div class="field-hint">Overrides the image default CMD</div>
            </div>

            <!-- Submit -->
            <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid var(--border)">
                <a href="/"
                   hx-get="/partials/overview" hx-target="#main-content" hx-push-url="/"
                   class="btn btn-ghost sm">Cancel</a>
                <button type="submit" class="btn btn-primary sm">
                    <svg class="icon-sm"><use href="/static/lucide-sprite.svg#plus"></use></svg>
                    Create container
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function autoHostname(name) {
    var h = document.getElementById('field-hostname');
    if(h && (h.value === '' || h.dataset.auto === 'true')) {
        h.value = name ? 'keel-' + name.toLowerCase().replace(/[^a-z0-9-]/g,'-') : '';
        h.dataset.auto = 'true';
    }
}
document.getElementById('field-hostname').addEventListener('input', function(){
    this.dataset.auto = 'false';
});

function handleCreateResponse(evt) {
    var xhr = evt.detail.xhr;
    if(xhr.status >= 400) {
        showToast('Error: ' + xhr.responseText, 'error');
        return;
    }
    htmx.ajax('GET', '/partials/overview', {target:'#main-content', swap:'innerHTML'});
    history.pushState(null, '', '/');
}
</script>
{{end}}
