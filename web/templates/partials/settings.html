{{define "settings"}}
<div>
    <!-- Page header -->
    <div class="page-header">
        <span class="page-title">Settings</span>
        <span class="page-subtitle">application settings</span>
    </div>

    <div style="padding:20px 24px">
        <!-- About -->
        <div class="chart-section">
            <div class="chart-header">
                <span class="chart-title">about keel</span>
            </div>
            <p style="font-family:var(--mono);font-size:11px;color:var(--muted);margin:0 0 12px">
                Keel is a free, open-source Docker container management dashboard.
            </p>
            <div style="display:flex;gap:8px;align-items:center">
                <span style="font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase">version</span>
                <span style="font-family:var(--mono);font-size:11px;color:var(--text)">{{.Version}}</span>
            </div>
        </div>

        <!-- Support -->
        <div class="chart-section">
            <div class="chart-header">
                <span class="chart-title">support the project</span>
            </div>
            <p style="font-family:var(--mono);font-size:11px;color:var(--muted);margin:0 0 12px">
                If Keel is useful to you, consider donating to support development.
            </p>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
                <a href="https://donate.stripe.com/7sY14p4Uz28QdYB66fd7q00" target="_blank" rel="noopener"
                   class="btn btn-primary sm">
                    <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 8h1a4 4 0 1 1 0 8h-1"/>
                        <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
                        <line x1="6" y1="2" x2="6" y2="4"/>
                        <line x1="10" y1="2" x2="10" y2="4"/>
                        <line x1="14" y1="2" x2="14" y2="4"/>
                    </svg>
                    Brasil (Stripe)
                </a>
                <a href="https://buymeacoffee.com/metzker" target="_blank" rel="noopener"
                   class="btn btn-ghost sm">
                    <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 8h1a4 4 0 1 1 0 8h-1"/>
                        <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
                        <line x1="6" y1="2" x2="6" y2="4"/>
                        <line x1="10" y1="2" x2="10" y2="4"/>
                        <line x1="14" y1="2" x2="14" y2="4"/>
                    </svg>
                    International (BMC)
                </a>
            </div>
        </div>
    </div>
</div>
{{end}}
