{{define "metrics-mini"}}
<span class="font-mono" style="color:var(--muted)">cpu <span class="val" style="color:var(--accent)">{{printf "%.0f" .CPU.UsagePercent}}%</span></span>
<span class="sep" style="color:var(--border2)">·</span>
<span class="font-mono" style="color:var(--muted)">ram <span class="val" style="color:var(--accent)">{{printf "%.0f" .Memory.UsagePercent}}%</span></span>
<span class="sep" style="color:var(--border2)">·</span>
<span class="font-mono" style="color:var(--muted)">disk <span class="val" style="color:var(--accent)">{{printf "%.0f" .Disk.UsagePercent}}%</span></span>
{{end}}
