{{define "metrics-mini"}}
<span class="font-mono" title="CPU" style="color:var(--color-text-muted)">CPU <span style="color:var(--color-primary)">{{printf "%.0f" .CPU.UsagePercent}}%</span></span>
<span style="color:var(--color-border)">|</span>
<span class="font-mono" title="RAM" style="color:var(--color-text-muted)">RAM <span style="color:var(--color-primary)">{{printf "%.0f" .Memory.UsagePercent}}%</span></span>
<span style="color:var(--color-border)">|</span>
<span class="font-mono" title="Disk" style="color:var(--color-text-muted)">Disk <span style="color:var(--color-primary)">{{printf "%.0f" .Disk.UsagePercent}}%</span></span>
{{end}}
