<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keel</title>
    <link rel="icon" type="image/png" href="/static/icons/icon.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="/static/icons/icon-light.png" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#fbfbf8">
    <meta name="description" content="Docker container management dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Recursive:slnt,wght,CASL,MONO@-15..0,300..700,0..1,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/xterm.css">
</head>
<body x-data="{
    terminalOpen: false
}" @toggle-terminal.document="terminalOpen = !terminalOpen"
   @connect-container.document="terminalOpen = true">

    <!-- Topbar -->
    <div class="topbar">
        <button class="sidebar-hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" viewBox="0 0 24 24">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <div class="topbar-logo">
            <img class="topbar-logo-img" src="/static/icons/navbar.png" alt="Keel" height="28">
        </div>

        <div class="topbar-sep"></div>

        <div class="donate-dropdown" style="position:relative">
            <button class="topbar-btn bmac-btn" onclick="this.parentElement.classList.toggle('open')" title="Support the project">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 8h1a4 4 0 110 8h-1"/>
                    <path d="M3 8h14v9a4 4 0 01-4 4H7a4 4 0 01-4-4V8z"/>
                    <line x1="6" y1="2" x2="6" y2="4"/>
                    <line x1="10" y1="2" x2="10" y2="4"/>
                    <line x1="14" y1="2" x2="14" y2="4"/>
                </svg>
                donate
            </button>
            <div class="donate-menu">
                <a href="https://donate.stripe.com/7sY14p4Uz28QdYB66fd7q00" target="_blank" rel="noopener">Brasil (Stripe)</a>
                <a href="https://buymeacoffee.com/metzker" target="_blank" rel="noopener">International (BMC)</a>
            </div>
        </div>

        <div class="topbar-right">
            <div id="update-indicator" style="display:none">
                <button class="update-pill" onclick="openUpdateModal()" title="New version available">
                    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v14m0 0l-4-4m4 4l4-4"/><path d="M5 19h14"/></svg>
                    <span id="update-version"></span>
                </button>
            </div>
            <div class="target-selector">
                <span class="target-dot" id="tunnel-dot"></span>
                {{.TargetName}}
            </div>
            <div id="metrics-mini"
                 hx-get="/partials/metrics-mini"
                 hx-trigger="load, every 10s"
                 hx-swap="innerHTML"></div>

            <button class="topbar-btn"
                    @click="terminalOpen = !terminalOpen"
                    :class="terminalOpen ? 'active' : ''">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                terminal
            </button>
        </div>
    </div>

    <!-- Layout: sidebar + main -->
    <div class="layout">

        <!-- Sidebar overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">navigation</div>
                <a href="/"
                   hx-get="/partials/overview" hx-target="#main-content" hx-push-url="/"
                   data-page="/"
                   class="sidebar-item{{if eq .Page "/"}} active{{end}}">
                    <svg viewBox="0 0 24 24"><use href="/static/lucide-sprite.svg#layout-dashboard"></use></svg>
                    Dashboard
                </a>
                <a href="/metrics"
                   hx-get="/partials/metrics" hx-target="#main-content" hx-push-url="/metrics"
                   data-page="/metrics"
                   class="sidebar-item{{if eq .Page "/metrics"}} active{{end}}">
                    <svg viewBox="0 0 24 24"><use href="/static/lucide-sprite.svg#activity"></use></svg>
                    Metrics
                </a>
                <a href="/logs"
                   hx-get="/partials/logs" hx-target="#main-content" hx-push-url="/logs"
                   data-page="/logs"
                   class="sidebar-item{{if eq .Page "/logs"}} active{{end}}">
                    <svg viewBox="0 0 24 24"><use href="/static/lucide-sprite.svg#file-text"></use></svg>
                    Logs
                </a>
                <a href="/seeders"
                   hx-get="/partials/seeders" hx-target="#main-content" hx-push-url="/seeders"
                   data-page="/seeders"
                   class="sidebar-item{{if eq .Page "/seeders"}} active{{end}}">
                    <svg viewBox="0 0 24 24"><use href="/static/lucide-sprite.svg#database"></use></svg>
                    Seeders
                </a>
                <a href="/settings"
                   hx-get="/partials/settings" hx-target="#main-content" hx-push-url="/settings"
                   data-page="/settings"
                   class="sidebar-item{{if eq .Page "/settings"}} active{{end}}">
                    <svg viewBox="0 0 24 24"><use href="/static/lucide-sprite.svg#settings"></use></svg>
                    Settings
                </a>
            </div>

            <a href="/services/new"
               hx-get="/partials/service-new" hx-target="#main-content" hx-push-url="/services/new"
               data-page="/services/new"
               class="sidebar-add{{if eq .Page "/services/new"}} active{{end}}">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New container
            </a>

            <div class="sidebar-footer">
                <div class="sidebar-version">keel {{.Version}}</div>
            </div>
        </aside>

        <!-- Main content -->
        <div class="main">
            <div id="main-content" class="page-body">
                {{block "content" .}}{{end}}
            </div>
        </div>

    </div>

    <!-- Operation progress panel -->
    {{template "operation-progress" .}}

    <!-- Terminal bottom panel -->
    <div class="terminal-panel"
         x-show="terminalOpen"
         x-transition.opacity.duration.150ms>
        {{template "terminal-panel" .}}
    </div>

    <!-- Confirmation modal -->
    <dialog id="confirm-modal">
        <article>
            <h3 id="confirm-title"></h3>
            <p id="confirm-message" class="text-sm text-muted" style="margin:0"></p>
            <footer>
                <button class="btn-ghost btn sm" onclick="document.getElementById('confirm-modal').close()">Cancel</button>
                <button id="confirm-btn" class="btn btn-primary sm">Confirm</button>
            </footer>
        </article>
    </dialog>

    <!-- Update modal -->
    <dialog id="update-modal">
        <article class="update-modal-content">
            <header class="update-modal-header">
                <div>
                    <h3>New version available</h3>
                    <p class="text-sm text-muted" style="margin:0">
                        <span id="update-modal-current"></span>
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="vertical-align:middle;margin:0 4px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        <span id="update-modal-latest" class="text-accent"></span>
                    </p>
                </div>
                <button class="btn-ghost btn sm" onclick="document.getElementById('update-modal').close()" id="update-modal-close-btn">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </header>
            <div id="update-modal-changelog" class="update-modal-changelog"></div>
            <div id="update-modal-progress" class="update-modal-progress" style="display:none"></div>
            <footer class="update-modal-footer">
                <button class="btn-ghost btn sm" onclick="document.getElementById('update-modal').close()" id="update-modal-cancel">Cancel</button>
                <button class="btn btn-primary sm" id="update-modal-btn" onclick="performUpdate()">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin-right:4px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Update now
                </button>
            </footer>
        </article>
    </dialog>

    <!-- Detail overlay + panel -->
    <div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
    <div class="detail-panel" id="detail-panel"></div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <!-- Operation banner (persistent progress indicator) -->
    <div id="op-banner" class="op-banner" style="display:none" aria-live="polite"></div>

    <!-- Scripts -->
    <script src="/static/htmx.min.js"></script>
    <script src="/static/ansi_up.min.js"></script>
    <script src="/static/xterm.min.js"></script>
    <script src="/static/xterm-addon-fit.min.js"></script>
    <script src="/static/app.js"></script>
    <script>
    // On full page load, load the correct partial
    (function() {
        var page = "{{.Page}}";
        if (!page || page === "/") page = "/";
        var map = {
            "/": "/partials/overview",
            "/logs": "/partials/logs",
            "/metrics": "/partials/metrics",
            "/settings": "/partials/settings",
            "/seeders": "/partials/seeders",
            "/services/new": "/partials/service-new"
        };
        var url = map[page];
        if (!url && page.indexOf("/services/") === 0) {
            var name = page.replace("/services/", "");
            url = "/partials/service/" + name;
        }
        if (url) {
            htmx.ajax('GET', url, {target: '#main-content', swap: 'innerHTML'});
        }
        setActiveNav(page);
    })();

    // Sidebar toggle (mobile)
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('open');
    }

    // Close sidebar on navigation (mobile)
    document.querySelectorAll('.sidebar a').forEach(function(a) {
        a.addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('open');
        });
    });

    // Detail panel helpers
    function openDetail(html) {
        document.getElementById('detail-panel').innerHTML = html;
        document.getElementById('detail-panel').classList.add('open');
        document.getElementById('detail-overlay').classList.add('open');
    }

    function closeDetail() {
        document.getElementById('detail-panel').classList.remove('open');
        document.getElementById('detail-overlay').classList.remove('open');
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeDetail();
    });

    // Tunnel status indicator (SSE)
    (function() {
        var dot = document.getElementById('tunnel-dot');
        if (!dot) return;
        var colors = {
            connected:    'var(--green)',
            reconnecting: 'var(--yellow, #e2b93d)',
            failed:       'var(--red, #e25c5c)',
            disconnected: 'var(--muted, #888)'
        };
        var es = new EventSource('/api/tunnel/status');
        es.onmessage = function(e) {
            var c = colors[e.data] || colors.connected;
            dot.style.background = c;
            dot.style.boxShadow = '0 0 6px ' + c;
            dot.title = 'Tunnel: ' + e.data;
        };
    })();
    </script>
    <script src="/static/alpine.min.js" defer></script>
</body>
</html>
